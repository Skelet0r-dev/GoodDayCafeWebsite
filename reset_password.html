<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password - Good Day Cafe</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts (Playfair, Montserrat, Poppins) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/loginandregis_style.css">

    <style>
        body {
            background-color: #111;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reset-card {
            width: 100%;
            max-width: 440px;
        }
    </style>
</head>

<body>
    <div class="reset-card">
        <div class="modal-content modal-content-dark p-4">
            <h3 class="font-playfair fw-bold mb-1">Reset Password</h3>
            <p class="text-secondary small mb-4">Enter your new password below.</p>

            <form method="post" action="reset_password.php" id="resetForm">
                <input type="hidden" id="tokenField" name="token">

                <!-- New Password -->
                <div class="mb-3">
                    <label for="newPassword" class="form-label small text-uppercase tracking-wide">New Password</label>
                    <input type="password" class="form-control form-control-lg form-control-dark" id="newPassword" name="newPassword" placeholder="••••••••" required>
                </div>

                <!-- Confirm Password -->
                <div class="mb-4">
                    <label for="confirmPassword" class="form-label small text-uppercase tracking-wide">Confirm New Password</label>
                    <input type="password" class="form-control form-control-lg form-control-dark" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required>
                </div>

                <!-- Submit Button -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-light btn-lg font-playfair fw-bold">Reset Password</button>
                </div>
            </form>

            <div class="mt-3 text-center">
                <a href="loginandregis.html" class="link-light-custom small">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Read token from URL query parameter and populate hidden field
        (function () {
            var params = new URLSearchParams(window.location.search);
            var token = params.get('token');
            if (token) {
                document.getElementById('tokenField').value = token;
            } else {
                alert('Invalid or missing reset token.');
                window.location.href = 'loginandregis.html';
            }
        })();

        // Validate passwords match before submit
        document.getElementById('resetForm').addEventListener('submit', function (e) {
            var newPwd = document.getElementById('newPassword').value;
            var confirmPwd = document.getElementById('confirmPassword').value;
            if (newPwd !== confirmPwd) {
                e.preventDefault();
                alert('Passwords do not match. Please try again.');
            }
        });
    </script>
</body>
</html>
